# profiles/anvil-chaos-experiment.yaml
#
# Anvil (Addition #29 / PRD-29 / Q29) reference profile for chaos-
# engineering verdict runs.
#
# Family coverage at v1.1 (revisited post-Q66 sweep + Q70 framework):
#   - Family A (per-signal mean shift): enabled, primary detector
#   - Family C (multivariate drift): enabled, unexpected-blast catcher
#   - Family D (spectral / oscillation): enabled — scale-invariant in its
#     math anchor (peak |ACF| vs μ₀/σ₀); applicable to chaos workloads
#     with natural oscillation signatures (capacity injection, network
#     partition recovery cycles)
#   - Family E (conformal novelty): enabled with honest calibration
#     provenance — the conformal coverage math is rigorous; the
#     calibration substrate must be declared in the audit record
#     (`baseline_provenance`) since chaos-workload-specific calibration
#     history does not yet exist
#   - Family B (LLM-inference-specific structural): disabled (workload-
#     specific signatures don't transfer; chaos-structural signatures
#     are future work)
#
# Original Q29.3 architect-pick was A+C only. The post-Q66 sweep audit
# (94% FPR pass on real LLM-inference substrates × iid_bootstrap mode;
# 4/5 incident detection with 4/4 attribution accuracy under Ville-bound
# discipline) plus the Q70 calibration-regime architecture establish
# that D+E are defensible additions. Within-dataset autocorrelation
# (e.g., NAB ambient_temperature φ ≈ 0.95) remains the calibration-
# regime gap addressed by Q70 SLICE 2 (self-normalized e-process
# fallback wired into page-cusum + conformal dispatch); until SLICE 2
# ships, cross-domain anomaly transfer (e.g., NAB) is limited to 17.14
# aggregate per family. Within-substrate calibration on real LLM-
# inference workloads is within budget under iid_bootstrap.
#
# Suppression for declared expected_failure_pattern is routed via
# OrchestrateParams.expectedFailurePattern (transitional stand-in until
# the typed DeployContext interface lands); profile-level defaults in
# expected_failure_pattern_defaults below apply when the chaos adapter
# does not supply per-experiment overrides.

id: anvil-chaos-experiment
version: "1.0.0"
extends: generic-microservice
description: >
  Anvil chaos-engineering verdict profile. Family A + C + D + E enabled
  at v1.1 with documented per-family calibration provenance; Family B
  disabled pending chaos-structural signature work. Sequenced over the
  deploysignal-engine Ville-bounded portfolio with chaos-aware
  suppression keyed against the operator-declared
  expected_failure_pattern. Targets Verica-style chaos-engineering
  buyers.

sli_list:
  - signal: p99_latency
    direction_of_better: lower
    δ_min: 0.01
  - signal: downstream_err
    direction_of_better: lower
    δ_min: 0.05
  - signal: cost_req
    direction_of_better: lower
    δ_min: 0.01

structural_detectors:
  # Family B (LLM-inference-specific structural signatures) doesn't
  # transfer to generic chaos targets. Chaos-structural signatures
  # (capacity-injection patterns, network-partition characteristic
  # shapes) are tracked as future work; default-off at v1.1.
  enabled: false
  dependencies: []

joint_vector:
  # Family C + Family E joint observation. The signal pair p99_latency +
  # downstream_err is the canonical "did latency injection cause
  # unexpected error rate?" pairing — Family C's multivariate drift +
  # Family E's conformal novelty both consume this joint vector.
  signals:
    - p99_latency
    - downstream_err
  include_in_family_c: true
  include_in_family_e: true

alpha_allocation:
  # 4-family active portfolio. α-budget split with A as primary (40%),
  # C as unexpected-blast catcher (20%), D as oscillation/recovery
  # catcher (20%), E as novelty/distributional-shift catcher (20%).
  # B held at 0 pending chaos-structural signature work.
  per_family:
    A: 4.0e-4
    B: 0.0
    C: 2.0e-4
    D: 2.0e-4
    E: 2.0e-4
  total: 1.0e-3

cell_dimensions:
  # hour-of-day + day-of-week dimensions for cell stratification; the
  # other dimensions require customer-side data plumbing not yet wired
  # to chaos platforms at v1.
  hour_of_day: true
  day_of_week: true
  workload_class: false
  tenant_tier: false
  region: false

bake_profiles:
  # Chaos experiments have short windows (typically 30–120s); ticks-
  # before-eligible tightened vs generic-microservice so the verdict
  # fires within the typical chaos fault window.
  - signal: p99_latency
    min_ticks_before_eligible: 2
    min_observation_window: 2
    max_deploy_window_days: 1
  - signal: downstream_err
    min_ticks_before_eligible: 3
    min_observation_window: 3
    max_deploy_window_days: 1
  - signal: cost_req
    min_ticks_before_eligible: 6
    min_observation_window: 6
    max_deploy_window_days: 1

policy_defaults:
  # Chaos experiments default to advisory mode (auto_rollback_enabled:
  # false). Promoting to auto-rollback is operator-policy per chaos
  # platform; default-off matches industry expectation.
  reversibility_threshold_minutes: 5
  auto_rollback_enabled: false
  default_risk_tier: medium

expected_failure_pattern_defaults:
  # Profile-level defaults that apply when the adapter doesn't supply
  # per-experiment overrides. Family A is the typical suppression target
  # because chaos experiments overwhelmingly inject signal-shift faults
  # (latency, CPU stress, network delay) that Family A would otherwise
  # fire on by design.
  default_suppress_families: ["A"]
  default_recovery_seconds: 60
  default_magnitude_unit: "relative_fraction"
